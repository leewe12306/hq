<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>板块资金流向</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#333;font-family:system-ui,-apple-system,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:8px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.title-date{font-size:15px;font-weight:700;color:#c0392b}
.topbar-right{display:flex;align-items:center;gap:6px}
.btn{padding:4px 10px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;color:#666;font-size:11px;cursor:pointer}
.btn.active{background:#c0392b;color:#fff;border-color:#c0392b}
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.chart-col{flex:1;position:relative;overflow:hidden;background:#fff}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.sidebar{width:130px;flex-shrink:0;border-left:1px solid #eee;overflow-y:auto;background:#fff}
.sidebar-title{font-size:10px;color:#999;padding:6px 8px;border-bottom:1px solid #eee;background:#fafafa}
.sidebar-sub{font-size:9px;color:#bbb;margin-top:1px}
.rank-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.rank-item:hover{background:#fafafa}
.rank-item.selected{background:#fff5f5}
.ri-left{display:flex;align-items:center;gap:5px}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri-name{font-size:11px;color:#333;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-val{font-size:10px;font-family:'SF Mono',monospace;text-align:right}
.statusbar{padding:3px 10px;background:#fafafa;border-top:1px solid #eee;font-size:10px;color:#999;display:flex;justify-content:space-between;flex-shrink:0}
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10}
.loading-spin{width:28px;height:28px;border:3px solid #eee;border-top-color:#c0392b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:11px;color:#999}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="title-date" id="titleDate">板块资金流向</div>
    <div style="font-size:10px;color:#999;margin-top:2px">单位：亿元 | 按最新净流向排序</div>
  </div>
  <div class="topbar-right">
    <span style="font-size:10px;color:#999" id="updateTime">--</span>
    <button class="btn" onclick="refresh()">刷新</button>
  </div>
</div>

<div class="main">
  <div class="chart-col">
    <canvas id="myCanvas"></canvas>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spin"></div>
      <div class="loading-txt">正在加载分钟数据...</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-title">
      <div>板块资金流向</div>
      <div class="sidebar-sub">按最新净流量排序</div>
    </div>
    <div id="rankList"></div>
  </div>
</div>

<div class="statusbar">
  <span id="statusLeft">加载中...</span>
  <span id="statusRight">每60秒刷新</span>
</div>

<script>
// ── 监控板块（固定你关心的概念板块）──
const WATCH = [
  {code:'BK0438',name:'光通信模块'},
  {code:'BK0171',name:'PCB'},
  {code:'BK0573',name:'先进封装'},
  {code:'BK0490',name:'存储芯片'},
  {code:'BK0493',name:'半导体'},
  {code:'BK0012',name:'数据中心'},
  {code:'BK0478',name:'人形机器人'},
  {code:'BK0574',name:'液冷散热'},
  {code:'BK0482',name:'光纤概念'},
  {code:'BK0592',name:'MiniLED'},
  {code:'BK0532',name:'商业航天'},
  {code:'BK0567',name:'玻璃基板'},
  {code:'BK0551',name:'无人驾驶'},
  {code:'BK0548',name:'固态电池'},
  {code:'BK0701',name:'可控核聚变'},
  {code:'BK0029',name:'军工'},
  {code:'BK0036',name:'白酒'},
  {code:'BK0028',name:'银行'},
  {code:'BK0023',name:'证券'},
  {code:'BK0597',name:'创新药'},
  {code:'BK0056',name:'黄金概念'},
  {code:'BK0080',name:'稀土永磁'},
  {code:'BK0062',name:'电网概念'},
  {code:'BK0049',name:'消费电子'},
  {code:'BK0005',name:'电力'},
];

// 颜色（参考图中的配色）
const COLORS = [
  '#8B0000','#c0392b','#e74c3c','#e67e22','#f39c12',
  '#27ae60','#2ecc71','#1abc9c','#16a085','#2980b9',
  '#3498db','#8e44ad','#9b59b6','#2c3e50','#7f8c8d',
  '#d35400','#c0392b','#95a5a6','#bdc3c7','#ecf0f1',
  '#1a237e','#283593','#0288d1','#0097a7','#00695c',
];

let seriesMap = {}; // code -> {name, color, times:[], values:[]}
let cbN = 0;

function jsonp(url) {
  return new Promise((ok, err) => {
    const id = '_cb' + (cbN++);
    window[id] = d => { ok(d); delete window[id]; document.getElementById(id)?.remove(); };
    const s = document.createElement('script');
    s.id = id;
    s.src = url + (url.includes('?') ? '&' : '?') + 'cb=' + id + '&_=' + Date.now();
    s.onerror = () => { err(new Error('fail')); s.remove(); };
    document.head.appendChild(s);
    setTimeout(() => { if (window[id]) { err(new Error('timeout')); delete window[id]; s.remove(); } }, 8000);
  });
}

// ── 获取单个板块分钟资金流 ──
async function fetchSectorFlow(code) {
  try {
    const r = await jsonp(
      `https://push2.eastmoney.com/api/qt/stock/fflow/kline/get?secid=90.${code}&fields1=f1,f2,f3,f4&fields2=f51,f52,f53,f54,f55&klt=1`
    );
    if (!r?.data?.klines) return null;
    const times = [], values = [];
    r.data.klines.forEach(k => {
      const parts = k.split(',');
      // parts: 时间, 主力净流入累计, 小单, 中单, 大单
      const t = parts[0].substring(11, 16); // HH:MM
      const v = parseFloat(parts[1]); // 单位：元
      if (!isNaN(v)) { times.push(t); values.push(v / 1e8); } // 转亿
    });
    return { times, values };
  } catch(e) { return null; }
}

// ── 绘图 ──
function draw() {
  const canvas = document.getElementById('myCanvas');
  const W = canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  const H = canvas.height = canvas.offsetHeight * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const series = Object.values(seriesMap).filter(s => s.values.length > 0);
  if (!series.length) return;

  // 按最新值排序
  series.sort((a, b) => (b.values[b.values.length-1]||0) - (a.values[a.values.length-1]||0));

  // 值域
  let minV = Infinity, maxV = -Infinity;
  series.forEach(s => s.values.forEach(v => { if(v<minV)minV=v; if(v>maxV)maxV=v; }));
  const padV = (maxV - minV) * 0.08 || 10;
  minV -= padV; maxV += padV;
  const range = maxV - minV || 1;

  // X轴时间（取最长的）
  let allTimes = [];
  series.forEach(s => { if(s.times.length > allTimes.length) allTimes = s.times; });

  const pad = {
    top:    16 * devicePixelRatio,
    right:  90 * devicePixelRatio, // 右侧留标签空间
    bottom: 28 * devicePixelRatio,
    left:   52 * devicePixelRatio,
  };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top  - pad.bottom;

  const xScale = i => pad.left + (allTimes.length > 1 ? i / (allTimes.length - 1) * cW : cW / 2);
  const yScale = v => pad.top + cH - ((v - minV) / range) * cH;

  // 背景
  // 正区（绿色浅底）
  const y0 = yScale(0);
  ctx.fillStyle = '#fff0f0';
  ctx.fillRect(pad.left, pad.top, cW, Math.max(0, y0 - pad.top));
  ctx.fillStyle = '#f0fff4';
  ctx.fillRect(pad.left, y0, cW, Math.max(0, pad.top + cH - y0));

  // 网格线 + Y轴标签
  ctx.strokeStyle = 'rgba(0,0,0,.06)';
  ctx.lineWidth = devicePixelRatio;
  const ySteps = 8;
  for (let i = 0; i <= ySteps; i++) {
    const v = minV + (range / ySteps) * i;
    const y = yScale(v);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.fillStyle = '#999';
    ctx.font = `${9 * devicePixelRatio}px 'SF Mono',monospace`;
    ctx.textAlign = 'right';
    ctx.fillText((v >= 0 ? '' : '') + v.toFixed(0) + '亿', pad.left - 4 * devicePixelRatio, y + 3 * devicePixelRatio);
  }

  // 零线加粗
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(0,0,0,.2)';
  ctx.lineWidth = devicePixelRatio;
  ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left + cW, y0);
  ctx.stroke();
  ctx.fillStyle = '#666';
  ctx.font = `${9 * devicePixelRatio}px 'SF Mono',monospace`;
  ctx.textAlign = 'right';
  ctx.fillText('0亿', pad.left - 4 * devicePixelRatio, y0 + 3 * devicePixelRatio);

  // X轴时间标签
  const xTicks = ['9:30','10:30','11:30','13:00','14:00','15:00'];
  ctx.fillStyle = '#999';
  ctx.font = `${9 * devicePixelRatio}px system-ui`;
  ctx.textAlign = 'center';
  xTicks.forEach(t => {
    const idx = allTimes.indexOf(t);
    if (idx < 0) return;
    const x = xScale(idx);
    ctx.fillText(t, x, H - 8 * devicePixelRatio);
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,0,0,.08)';
    ctx.lineWidth = devicePixelRatio;
    ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + cH);
    ctx.stroke();
  });

  // 折线
  series.forEach(s => {
    if (s.values.length < 2) return;
    const pts = s.values.map((v, i) => {
      // 对齐到全局时间轴
      const ti = allTimes.indexOf(s.times[i]);
      return ti >= 0 ? { x: xScale(ti), y: yScale(v) } : null;
    }).filter(Boolean);
    if (pts.length < 2) return;

    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5 * devicePixelRatio;
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 0;
    ctx.stroke();

    // 右侧标签
    const last = pts[pts.length - 1];
    const lastVal = s.values[s.values.length - 1];
    const label = `${s.name} ${lastVal >= 0 ? '+' : ''}${lastVal.toFixed(2)}亿`;
    ctx.fillStyle = s.color;
    ctx.font = `${8.5 * devicePixelRatio}px system-ui`;
    ctx.textAlign = 'left';
    // 避免重叠简单偏移
    ctx.fillText(label, last.x + 4 * devicePixelRatio, last.y + 3 * devicePixelRatio);
  });
}

// ── 渲染右侧排行 ──
function renderRank() {
  const series = Object.values(seriesMap).filter(s => s.values.length > 0);
  series.sort((a, b) => (b.values[b.values.length-1]||0) - (a.values[a.values.length-1]||0));
  document.getElementById('rankList').innerHTML = series.map(s => {
    const v = s.values[s.values.length - 1] || 0;
    const isUp = v >= 0;
    return `<div class="rank-item">
      <div class="ri-left">
        <div class="ri-dot" style="background:${s.color}"></div>
        <div class="ri-name" title="${s.name}">${s.name}</div>
      </div>
      <div class="ri-val" style="color:${isUp ? '#c0392b' : '#27ae60'}">${isUp ? '+' : ''}${v.toFixed(2)}亿</div>
    </div>`;
  }).join('');
}

// ── 主刷新 ──
async function refresh() {
  document.getElementById('statusLeft').textContent = '加载分钟数据...';
  const now = new Date();
  const dateStr = `${now.getMonth()+1}月${now.getDate()}日板块资金流向`;
  document.getElementById('titleDate').textContent = dateStr;

  // 并行拉取所有板块
  const results = await Promise.allSettled(
    WATCH.map(async (w, i) => {
      const data = await fetchSectorFlow(w.code);
      if (data && data.values.length > 0) {
        seriesMap[w.code] = {
          code: w.code,
          name: w.name,
          color: COLORS[i % COLORS.length],
          times: data.times,
          values: data.values,
        };
      }
    })
  );

  const loaded = Object.keys(seriesMap).length;
  document.getElementById('loadingOverlay').style.display = loaded > 0 ? 'none' : 'flex';

  draw();
  renderRank();

  const timeStr = now.toLocaleTimeString('zh-CN');
  document.getElementById('updateTime').textContent = timeStr;
  document.getElementById('statusLeft').textContent = `已加载 ${loaded}/${WATCH.length} 个板块`;
}

window.addEventListener('resize', draw);

// 首次加载
refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
